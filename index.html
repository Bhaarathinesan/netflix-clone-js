<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            NETFLIX
        </div>

        <div class="nav-right">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Movies">

            <button id="searchBtn">
                Search
            </button>

        </div>

    </nav>

    <!-- Hero Banner -->

    <header class="banner">

        <div class="banner-content">

            <h1>Unlimited Movies, TV Shows and More</h1>

            <p>
                Watch anywhere. Cancel anytime.
            </p>

            <button class="play-btn">
                ▶ Play
            </button>

        </div>

    </header>

    <!-- Trending Movies -->

    <section class="movie-section">

        <h2>Trending Now</h2>

        <div class="movie-row">

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/yF1eOkaYvwiORauRCPWznV9xVvi.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg">
            </div>

        </div>

    </section>

    <!-- Popular Movies -->

    <section class="movie-section">

        <h2>Popular Movies</h2>

        <div class="movie-row">

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/4HodYYKEIsGOdinkGi2Ucz6X9i0.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/r7XifzvtezNt31ypvsmb6Oqxw49.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg">
            </div>

            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <p>
            Netflix Clone © 2026 | Built with HTML, CSS & JavaScript
        </p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
