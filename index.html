<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Netflix Clone</title>

    <link rel="stylesheet"
          href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
          rel="stylesheet">

</head>

<!-- Trailer Modal -->

<div id="trailerModal" class="modal">

    <div class="modal-content trailer-content">

        <span id="closeTrailer">
            &times;
        </span>

        <iframe
            id="trailerFrame"
            width="100%"
            height="500"
            src=""
            frameborder="0"
            allowfullscreen>

        </iframe>

    </div>

</div>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            NETFLIX
        </div>

        <div class="nav-right">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Movies">

            <button id="searchBtn">
                Search
            </button>

        </div>

    </nav>

    <!-- Hero Banner -->

    <header class="banner">

        <div class="banner-content">

            <h1>
                Unlimited Movies, TV Shows and More
            </h1>

            <p>
                Watch anywhere. Cancel anytime.
            </p>

            <button class="play-btn">
                ▶ Play
            </button>

        </div>

    </header>

    <!-- Search Results -->

    <section class="movie-section">

        <h2>
            🎬 Movies
        </h2>

        <div id="moviesContainer"
             class="movie-row">

        </div>

    </section>

    <!-- Watchlist -->

    <section class="movie-section">

        <h2>
            ❤️ My Watchlist
        </h2>

        <div id="watchlistContainer"
             class="movie-row">

        </div>

    </section>

    <!-- Movie Details Modal -->

    <div id="movieModal"
         class="modal">

        <div class="modal-content">

            <span id="closeModal">
                &times;
            </span>

            <div id="movieDetails">

            </div>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        <p>
            Netflix Clone © 2026 |
            Built with HTML, CSS & JavaScript |
            Powered by OMDb API
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
